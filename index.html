<!-- force deploy -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND (simple clean) */
body{
    background: linear-gradient(to right, #dfe9f3, #ffffff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    background:#2196f3;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD LAYOUT */
.parent-card{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* INPUT */
.input-group{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

input:focus{
    border:1px solid #2196f3;
    outline:none;
}

/* BUTTON */
button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:#2196f3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

/* WEATHER */
.weather-item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #ddd;
}

/* HISTORY */
.history button{
    margin:5px;
    background:#e3f2fd;
    color:black;
}

.history button:hover{
    background:#bbdefb;
}

/* CLEAR BUTTON */
#clearBtn{
    width:100%;
    margin-top:10px;
    background:#e74c3c;
}

#clearBtn:hover{
    background:#c0392b;
}

/* FOOTER */
footer{
    text-align:center;
    padding:10px;
    background:#eee;
}

@media(max-width:768px){
    .parent-card{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<header>
    🌤 Async Weather Tracker
</header>

<div class="container">
    <div class="parent-card">

        <!-- SEARCH -->
        <div class="card">
            <h3>Search City</h3>
            <div class="input-group">
                <input id="cityInput" placeholder="Enter city">
                <button id="searchBtn">Search</button>
            </div>

            <h3>History</h3>
            <div id="history" class="history"></div>

            <button id="clearBtn">Clear History</button>
        </div>

        <!-- WEATHER -->
        <div class="card">
            <h3>Weather Info</h3>
            <div id="weather"></div>
        </div>

    </div>
</div>

<footer>
    Simple Weather App Project
</footer>

<script>
const API_KEY = "67ac385865b212c44a181b824a115883";

const weatherBox = document.getElementById("weather");
const historyBox = document.getElementById("history");

/* FETCH */
async function getWeather(city) {
    const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
    );
    if (!res.ok) {
        alert("City not found");
        throw new Error("City not found");
    }
    return await res.json();
}

/* BUTTON CLICK */
document.getElementById("searchBtn").onclick = () => {
    const city = cityInput.value.trim();
    if (city) search(city);
};

/* RENDER */
function renderWeather(d) {
    weatherBox.innerHTML = `
    <div class="weather-item"><span>City</span><span>${d.name}</span></div>
    <div class="weather-item"><span>Temp</span><span>${d.main.temp} °C</span></div>
    <div class="weather-item"><span>Weather</span><span>${d.weather[0].main}</span></div>
    <div class="weather-item"><span>Humidity</span><span>${d.main.humidity}%</span></div>
    `;
}

/* SAVE HISTORY */
function saveHistory(city) {
    let history = JSON.parse(localStorage.getItem("weatherHistory") || "[]");

    history = history.filter(c => c !== city);
    history.unshift(city);
    history = history.slice(0,5);

    localStorage.setItem("weatherHistory", JSON.stringify(history));
    showHistory();
}

/* SHOW HISTORY */
function showHistory() {
    let history = JSON.parse(localStorage.getItem("weatherHistory") || "[]");

    historyBox.innerHTML = "";
    history.forEach(city => {
        let btn = document.createElement("button");
        btn.textContent = city;
        btn.onclick = () => search(city);
        historyBox.appendChild(btn);
    });
}

/* CLEAR HISTORY */
document.getElementById("clearBtn").onclick = () => {
    localStorage.removeItem("weatherHistory");
    showHistory();
};

/* SEARCH */
async function search(city) {
    weatherBox.innerHTML = "Loading...";
    try {
        const data = await getWeather(city);
        renderWeather(data);
        saveHistory(data.name);
    } catch (error) {
        weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
    }
}

/* ENTER KEY */
cityInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        const city = cityInput.value.trim();
        if (city) search(city);
    }
});

/* INIT */
showHistory();
</script>

</body>
</html>
